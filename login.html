<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Pragna College</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <span style="font-size:3rem;">🎓</span>
      <h2>Pragna College of Education</h2>
      <p>Fee & Certificate Tracker</p>
    </div>

    <div id="error-box" style="display:none;" class="error-msg mb-2"></div>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        class="form-control"
        placeholder="admin@pragna.edu"
        autocomplete="email"
      />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        class="form-control"
        placeholder="••••••••"
        autocomplete="current-password"
      />
    </div>

    <button id="login-btn" class="btn btn-primary" style="width:100%;justify-content:center;">
      Login
    </button>

    <div class="mt-2 text-center">
      <a href="#" id="forgot-link" style="font-size:0.85rem;">Forgot password?</a>
    </div>

    <div class="mt-3" style="border-top:1px solid var(--border);padding-top:16px;text-align:center;">
      <a href="student-view.html" style="font-size:0.85rem;color:var(--text-muted);">
        🔍 Student Fee Lookup →
      </a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
  // Redirect if already logged in
  supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'index.html';
  });

  // Login button
  document.getElementById('login-btn').addEventListener('click', async () => {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorBox = document.getElementById('error-box');
    const btn      = document.getElementById('login-btn');

    errorBox.style.display = 'none';

    if (!email || !password) {
      errorBox.textContent = 'Please enter email and password.';
      errorBox.style.display = 'block';
      return;
    }

    btn.textContent = 'Logging in...';
    btn.disabled = true;

    try {
      await login(email, password);
      window.location.href = 'index.html';
    } catch (err) {
      errorBox.textContent = err.message || 'Login failed. Please try again.';
      errorBox.style.display = 'block';
      btn.textContent = 'Login';
      btn.disabled = false;
    }
  });

  // Enter key support
  document.getElementById('password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });

  // Forgot password
  document.getElementById('forgot-link').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) {
      alert('Please enter your email address first.');
      return;
    }
    try {
      await resetPassword(email);
      alert('Password reset email sent! Check your inbox.');
    } catch (err) {
      alert(err.message || 'Failed to send reset email.');
    }
  });

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>

</body>
</html>
